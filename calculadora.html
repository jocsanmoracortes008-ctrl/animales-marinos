<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Animales Marinos</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #e6f7ff;
    margin: 0;
}

header{
    background-color: #0077b6;
    color: white;
    padding: 20px;
}

section{
    padding: 20px;
}

select,input{
    padding: 10px;
    margin: 10px;
}

button{
    padding: 10px 15px;
    margin: 10px;
    background-color: #0096c7;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover{
    background-color: #023e8a;
}

footer{
    background-color: #0077b6;
    color: white;
    padding: 10px;
    margin-top: 20px;
}

</style>

</head>
<body>

<header>
<h1>🧮 Calculadora de Peso</h1>
</header>

<section>

<h2>Calcula el peso aproximado</h2>

<p>Selecciona un animal marino:</p>

<select id="animal">

<option value="30">🐋 Ballena Gris (30 toneladas)</option>

<option value="0.2">🐬 Delfín (0.2 toneladas)</option>

<option value="6">⚫ Orca (6 toneladas)</option>

</select>

<br>

<p>¿Cuántos animales deseas calcular?</p>

<input type="number" id="cantidad" min="1">

<br>

<button onclick="calcularPeso()">
Calcular Peso
</button>

<h2 id="resultado"></h2>

<br>

<button onclick="window.location.href='index.html'">
🏠 Volver al Inicio
</button>

</section>

<footer>
<p>Proyecto HTML5 - Animales Marinos</p>
</footer>

<script>

function calcularPeso(){

    let peso =
    Number(document.getElementById("animal").value);

    let cantidad =
    Number(document.getElementById("cantidad").value);

    let total = peso * cantidad;

    document.getElementById("resultado").innerHTML =
    "Peso aproximado total: " + total + " toneladas.";

}

</script>

</body>
</html>
