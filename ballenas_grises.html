<h2>Información</h2>

<p>
La ballena gris es uno de los mamíferos marinos más grandes del océano.
Puede medir hasta 15 metros y pesar más de 30 toneladas.
</p>

<p>
Estas ballenas realizan una de las migraciones más largas del mundo,
viajando desde Alaska hasta las costas de México.
</p>

<p>
Se alimentan de pequeños crustáceos y organismos marinos que encuentran
en el fondo del océano.
</p>
